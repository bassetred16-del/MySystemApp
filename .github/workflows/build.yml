name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.10'
      - name: Build APK
        run: |
          pip install buildozer
          buildozer init
          sed -i 's/package.name = myapp/package.name = ze8csystem/' buildozer.spec
          # ملاحظة: هذا السطر سيقوم بمحاكاة البناء للتأكد من اشتغال المحرك
          echo "Building process started..."
