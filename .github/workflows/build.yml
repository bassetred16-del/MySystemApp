name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev
          pip install --user --upgrade buildozer
      - name: Build with Buildozer
        run: |
          # هاد السطر راح يكريي ملف الإعدادات إذا ماكانش
          [ -f buildozer.spec ] || buildozer init
          # هاد السطر راح يبدأ البناء الحقيقي
          buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: package
          path: bin/*.apk
